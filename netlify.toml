# MakChat — Netlify Configuration
# Replaces vercel.json for Netlify deployment
# Deploy: git push → auto-deploy via Netlify Git integration

[build]
  publish = "."          # root folder (index.html is at root)
  # No build command needed — pure static site

# SPA routing: redirect all paths to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Service Worker — must not be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control        = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Web Manifest — short cache
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type  = "application/manifest+json"

# JS modules — versioned by filename, cache aggressively
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
