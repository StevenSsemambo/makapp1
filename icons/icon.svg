<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2a0d"/>
      <stop offset="100%" stop-color="#2D6A27"/>
    </linearGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEC64"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Gold top accent bar -->
  <rect x="0" y="0" width="192" height="8" rx="4" fill="#FFD700" opacity="0.9"/>

  <!-- ===  MAKERERE MITCHELL HALL SILHOUETTE === -->

  <!-- Side wings of building (buttresses) -->
  <rect x="28" y="86" width="20" height="54" rx="3" fill="#FFD700" opacity="0.4"/>
  <rect x="144" y="86" width="20" height="54" rx="3" fill="#FFD700" opacity="0.4"/>

  <!-- Main tower body -->
  <rect x="82" y="52" width="28" height="88" rx="3" fill="url(#gld)" opacity="0.95"/>

  <!-- Arched entrance door (cutout effect) -->
  <rect x="89" y="108" width="14" height="32" rx="7" fill="#0f2a0d" opacity="0.85"/>

  <!-- Clock tower / middle tier -->
  <rect x="77" y="36" width="38" height="20" rx="3" fill="#FFD700"/>
  <!-- Clock face -->
  <circle cx="96" cy="46" r="6.5" fill="#1a4016"/>
  <circle cx="96" cy="46" r="5" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="96" y1="46" x2="96" y2="42" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="46" x2="99.5" y2="47.5" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Upper tower tier -->
  <rect x="84" y="22" width="24" height="16" rx="3" fill="#FFD700"/>

  <!-- Pointed spire / roof -->
  <polygon points="87,22 105,22 96,4" fill="#FFEC64"/>
  <!-- Spire tip ball -->
  <circle cx="96" cy="3.5" r="3.5" fill="#FFD700"/>

  <!-- Base platform / steps -->
  <rect x="34" y="140" width="124" height="8" rx="3" fill="#FFD700" opacity="0.65"/>
  <rect x="42" y="148" width="108" height="5" rx="2.5" fill="#FFD700" opacity="0.35"/>

  <!-- Makerere red accent stripe -->
  <rect x="38" y="157" width="116" height="4.5" rx="2.25" fill="#8B0000" opacity="0.85"/>

  <!-- === CHAT BUBBLE (MakChat identity, lower-right) === -->
  <rect x="116" y="105" width="62" height="42" rx="12" fill="#8B0000"/>
  <!-- Tail pointing bottom-left -->
  <polygon points="122,147 108,163 140,147" fill="#8B0000"/>
  <!-- Chat dots -->
  <circle cx="131" cy="126" r="5" fill="white"/>
  <circle cx="147" cy="126" r="5" fill="white"/>
  <circle cx="163" cy="126" r="5" fill="white"/>

  <!-- === MAK text bottom === -->
  <text x="96" y="182"
        font-family="'Arial Black','Arial',sans-serif"
        font-size="17" font-weight="900"
        fill="#FFD700" text-anchor="middle"
        letter-spacing="6" opacity="0.92">MAK</text>
</svg>
